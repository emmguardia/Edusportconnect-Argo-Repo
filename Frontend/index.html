<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Google Fonts : Poppins (géométrique, sans-serif). preconnect + stylesheet
         pour déclencher le téléchargement en parallèle du bundle JS et éviter le FOUC. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
    />
    <title>ÉduSport Connect — Accompagner les jeunes par le sport, l'éducation et le numérique</title>
    <meta
      name="description"
      content="ÉduSport Connect est une association engagée pour accompagner les jeunes dans leur développement personnel, éducatif et citoyen, à travers le sport, l'éducation et le numérique."
    />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="ÉduSport Connect" />
    <meta
      property="og:description"
      content="Un projet éducatif, citoyen, ouvert sur le monde et tourné vers l'avenir."
    />
    <meta property="og:locale" content="fr_FR" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
