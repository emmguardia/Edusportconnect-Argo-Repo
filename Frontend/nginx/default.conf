server {
    listen 8080;
    server_name edusportconnect.fr www.edusportconnect.fr;

    # Redirection www → apex
    if ($host = www.edusportconnect.fr) {
        return 301 $scheme://edusportconnect.fr$request_uri;
    }

    root /usr/share/nginx/html;
    index index.html;

    # ── En-têtes de sécurité ────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    # CSP adaptée au site vitrine : seulement self + Google Fonts.
    # 'unsafe-inline' sur style-src requis pour les styles inline (ex: transition-delay
    # des cartes piliers) et la feuille Google Fonts.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'" always;

    if ($request_method !~ ^(GET|HEAD|POST|PUT|DELETE|OPTIONS)$ ) {
        return 405;
    }

    # ── Blocage scanners / fichiers sensibles ────────────────────────────────────
    # Retourne 404 immédiatement pour les chemins typiques de bots malveillants,
    # au lieu de servir l'index.html du SPA (qui renverrait faussement un 200).
    location ~* /\.env($|\.|/) { return 404; }
    location ~* /\.git(/|$)    { return 404; }
    location ~* /\.aws(/|$)    { return 404; }
    location ~* /\.ssh(/|$)    { return 404; }

    location ~* \.(env|env\..+|bak|backup|save|old|swp|sql|log|key|pem|p12|pfx)$ {
        return 404;
    }

    location ~* ^/(phpinfo|info|test|wp-login|wp-admin|phpmyadmin|adminer|shell|webshell|backdoor|eval|upload|cgi-bin|xmlrpc)\.?(php|asp|aspx|jsp)?(/|$) {
        return 404;
    }

    location ~* ^/(aws\.json|aws-credentials|aws-config|s3cfg|\.s3cfg|\.npmrc|\.dockerenv|docker-compose\.yml|Dockerfile|package\.json|composer\.json|\.htaccess|web\.config)$ {
        return 404;
    }

    location ~* ^/(_debugbar|debugbar|debug|telescope|horizon|nova|clockwork)(/|$) {
        return 404;
    }

    # ── Health check (probes K8s) ────────────────────────────────────────────────
    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ── Proxy vers le backend ─────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://edusport-connect-backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
    }

    location /uploads/ {
        proxy_pass http://edusport-connect-backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, no-transform" always;
    }

    # ── Fichiers statiques servis depuis le build (dist/) ─────────────────────────
    location = /robots.txt  { access_log off; }
    location = /sitemap.xml {
        access_log off;
        add_header Content-Type "application/xml; charset=utf-8" always;
    }

    # ── SPA ───────────────────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Assets hashés par Vite → cache long immuable
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, no-transform, immutable" always;
        try_files $uri =404;
    }

    location ~* \.(css|js)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform, immutable" always;
        try_files $uri =404;
    }

    location /images/ {
        expires 1y;
        add_header Cache-Control "public, no-transform" always;
    }

    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform" always;
    }

    # ── Compression ────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript image/svg+xml;
    gzip_comp_level 6;
    gzip_disable "msie6";
}
