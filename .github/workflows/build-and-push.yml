# Build and push: main → bump version + digest (prod)
# ArgoCD : App Prod = branche main + namespace edusport-connect
#
# Frontend uniquement pour l'instant. Le backend sera ajouté ici plus tard.

name: Build and push to GHCR

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build'
        required: true
        default: 'main'
        type: choice
        options:
          - main

env:
  REGISTRY: ghcr.io
  TRIVY_IMAGE: aquasec/trivy:0.69.3

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

concurrency:
  group: build-and-push-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  test:
    name: Test & security
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Frontend/package-lock.json

      - name: Frontend – install
        working-directory: Frontend
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            echo "WARN: pas de package-lock.json, npm install"
            npm install --no-audit --no-fund
          fi

      - name: Frontend – audit (high+)
        run: cd Frontend && npm audit --audit-level=high

      - name: Frontend – lint
        run: cd Frontend && npm run lint
        continue-on-error: true  # lint informatif — corriger les warnings progressivement

      - name: Frontend – test (if present)
        run: cd Frontend && npm run test --if-present

  build-and-push:
    name: Build and push
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Frontend/package-lock.json

      - name: Bump version (prod)
        id: tag
        run: |
          CONTENT=$(cat version.txt | tr -d '\r\n ')
          MAJOR=$(echo "$CONTENT" | cut -d. -f1)
          MINOR=$(echo "$CONTENT" | cut -d. -f2)
          PATCH=$(echo "$CONTENT" | cut -d. -f3)
          if ! [[ "$MAJOR" =~ ^[0-9]+$ ]] || ! [[ "$MINOR" =~ ^[0-9]+$ ]] || ! [[ "$PATCH" =~ ^[0-9]+$ ]]; then
            echo "version.txt invalide: $CONTENT (attendu X.Y.Z)"
            exit 1
          fi
          if [ "$PATCH" -lt 9 ]; then
            PATCH=$((PATCH + 1))
          else
            PATCH=0
            MINOR=$((MINOR + 1))
          fi
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "$NEW_VERSION" > version.txt
          TAG="v${NEW_VERSION}"
          echo "IMAGE_TAG=$TAG" >> $GITHUB_ENV
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Version: $CONTENT → $NEW_VERSION (tag: $TAG)"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # ── Frontend ─────────────────────────────────────────────────────────────
      - name: Frontend – install & build (dist/ requis par Dockerfile)
        working-directory: Frontend
        run: |
          npm ci
          npm run build

      - name: Extract metadata (frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/edusport-connect-front
          tags: |
            type=raw,value=${{ steps.tag.outputs.tag }}

      # Étape 1 : build local pour le scan Trivy (pas de push)
      - name: Build frontend (local — pour scan Trivy)
        uses: docker/build-push-action@v6
        with:
          context: ./Frontend
          load: true
          push: false
          tags: scan-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          pull: true

      # Étape 2 : scan AVANT push — image vulnérable ne part jamais dans GHCR
      - name: Trivy scan frontend (avant push)
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            ${{ env.TRIVY_IMAGE }} image --exit-code 1 --severity CRITICAL,HIGH --ignore-unfixed --format table \
            scan-frontend:latest

      # Étape 3 : push uniquement si le scan est clean
      - name: Push frontend
        id: build-frontend
        uses: docker/build-push-action@v6
        with:
          context: ./Frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          pull: true

      # ── Pin digest dans values.yaml → ArgoCD sync automatique ─────────────────
      - name: Pin Helm values to image digest
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          DIGEST_FRONTEND="${{ steps.build-frontend.outputs.digest }}"
          OWNER="${{ github.repository_owner }}"
          REG="${{ env.REGISTRY }}"

          if [ -n "$DIGEST_FRONTEND" ]; then
            FRONTEND_IMAGE="${REG}/${OWNER}/edusport-connect-front@${DIGEST_FRONTEND}"
          else
            FRONTEND_IMAGE="${REG}/${OWNER}/edusport-connect-front:${TAG}"
          fi

          VALUES_PATH="charts/edusport-connect/values.yaml"

          sed -i "s|  image: ghcr.io/.*edusport-connect-front.*|  image: ${FRONTEND_IMAGE}|" "$VALUES_PATH"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add version.txt "$VALUES_PATH"

          if git diff --staged --quiet; then
            echo "Helm values already up to date, skip commit"
          else
            git commit -m "chore(helm): pin image to digest $TAG [skip ci]"
            git pull --rebase origin ${{ github.ref_name }}
            git push origin ${{ github.ref_name }}
          fi
