name: ESLint

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  eslint:
    name: Run ESLint scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci
        working-directory: ./Frontend

      - name: Install SARIF Formatter
        run: npm install @microsoft/eslint-formatter-sarif@3.1.0
        working-directory: ./Frontend

      - name: Run ESLint
        env:
          SARIF_ESLINT_IGNORE_SUPPRESSED: "true"
        run: |
          echo '{"version":"2.1.0","$schema":"https://json.schemastore.org/sarif-2.1.0.json","runs":[{"tool":{"driver":{"name":"ESLint","rules":[]}},"results":[]}]}' > eslint-results.sarif
          npx eslint . \
            --ext .js,.jsx,.ts,.tsx \
            --format @microsoft/eslint-formatter-sarif \
            --output-file eslint-results.sarif || true
        working-directory: ./Frontend

      - name: Upload analysis results to GitHub
        uses: github/codeql-action/upload-sarif@v4
        # Skip sur les PRs Dependabot — token restreint sans accès security-events
        if: always() && github.actor != 'dependabot[bot]'
        with:
          sarif_file: ./Frontend/eslint-results.sarif
          wait-for-processing: true
