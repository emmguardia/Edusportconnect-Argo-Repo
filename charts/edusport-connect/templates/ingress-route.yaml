apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: edusport-connect-ingress
  namespace: {{ include "esc.namespace" . }}
  annotations:
    # Appliqué APRÈS les middlewares (sync-wave supérieure) → la route ne référence
    # jamais un middleware encore absent.
    argocd.argoproj.io/sync-wave: "1"
  labels:
    {{- include "esc.labels" . | nindent 4 }}
spec:
  entryPoints:
    {{- toYaml .Values.ingress.entryPoints | nindent 4 }}
  routes:
    - match: "Host(`{{ .Values.domain }}`) || Host(`www.{{ .Values.domain }}`)"
      kind: Rule
      services:
        - name: edusport-connect-frontend-service
          port: 80
      middlewares:
        - name: security-headers
        {{- if .Values.ingress.crowdsec }}
        - name: crowdsec-bouncer
          namespace: kube-system
        {{- end }}
