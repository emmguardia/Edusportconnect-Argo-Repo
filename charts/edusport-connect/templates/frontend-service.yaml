apiVersion: v1
kind: Service
metadata:
  name: edusport-connect-frontend-service
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "esc.labels" . | nindent 4 }}
    {{- include "esc.frontend.selectorLabels" . | nindent 4 }}
spec:
  selector:
    {{- include "esc.frontend.selectorLabels" . | nindent 4 }}
  ports:
    - protocol: TCP
      port: 80                                # port exposé au cluster / Ingress
      targetPort: {{ .Values.frontend.port }} # port réel du pod (8080, non-root)
