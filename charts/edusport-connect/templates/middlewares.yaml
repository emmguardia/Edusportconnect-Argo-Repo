apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: security-headers
  namespace: {{ include "esc.namespace" . }}
  annotations:
    # Appliqué AVANT l'IngressRoute (sync-wave inférieure) pour que le middleware
    # existe toujours quand Traefik enregistre la route → évite la race condition
    # "middleware does not exist" au déploiement.
    argocd.argoproj.io/sync-wave: "-1"
  labels:
    {{- include "esc.labels" . | nindent 4 }}
spec:
  headers:
    stsSeconds: 31536000
    stsIncludeSubdomains: true
    stsPreload: true
    contentTypeNosniff: true
    customFrameOptionsValue: "SAMEORIGIN"
    browserXssFilter: true
    referrerPolicy: "strict-origin-when-cross-origin"
    customResponseHeaders:
      Permissions-Policy: "geolocation=(), microphone=(), camera=()"
      X-Powered-By: ""
