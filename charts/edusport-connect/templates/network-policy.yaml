{{- /* NetworkPolicy — isole le namespace edusport-connect.
       Frontend uniquement : accepte le trafic entrant depuis l'Ingress controller
       (géré au niveau cluster). Les règles backend seront ajoutées plus tard. */ -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frontend-ingress
  namespace: {{ include "esc.namespace" . }}
spec:
  podSelector:
    matchLabels:
      {{- include "esc.frontend.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - {}  # Autorise tout ingress (Ingress controller géré au niveau cluster)
