apiVersion: apps/v1
kind: Deployment
metadata:
  name: edusport-connect-backend
  namespace: {{ include "esc.namespace" . }}
  labels:
    {{- include "esc.labels" . | nindent 4 }}
    {{- include "esc.backend.selectorLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.backend.replicas }}
  revisionHistoryLimit: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "esc.backend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "esc.backend.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: backend
          image: {{ .Values.backend.image }}
          imagePullPolicy: {{ .Values.backend.imagePullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: {{ .Values.backend.port }}
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: {{ .Values.backend.port | quote }}
            - name: FRONTEND_URL
              value: {{ .Values.backend.frontendUrl | quote }}
            - name: UPLOAD_DIR
              value: /app/uploads/events
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: edusport-backend-secret
                  key: DB_HOST
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: edusport-backend-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: edusport-backend-secret
                  key: DB_PASSWORD
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: edusport-backend-secret
                  key: DB_NAME
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: edusport-backend-secret
                  key: JWT_SECRET
            - name: EMAIL_SERVICE_URL
              valueFrom:
                secretKeyRef:
                  name: edusport-backend-secret
                  key: EMAIL_SERVICE_URL
            - name: ADMIN_NOTIFICATION_EMAIL
              value: {{ .Values.backend.adminNotificationEmail | quote }}
            - name: JWT_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: edusport-backend-secret
                  key: JWT_PRIVATE_KEY
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          startupProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.backend.port }}
            initialDelaySeconds: 5
            periodSeconds: 3
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.backend.port }}
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.backend.port }}
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: edusport-connect-uploads
