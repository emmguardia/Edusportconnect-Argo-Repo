# values.yaml — ÉduSport Connect (prod)
# Les images sont mises à jour automatiquement par la CI (build-and-push.yml)
# Format : ghcr.io/<owner>/<image>@sha256:<digest>  (piqué par la CI)

namespace: edusport-connect

# Nom de domaine principal (utilisé par l'IngressRoute Traefik)
domain: edusportconnect.fr

# ── Ingress (Traefik) ──────────────────────────────────────────────────────────
ingress:
  entryPoints:
    - web
  # Active le middleware crowdsec-bouncer (présent dans kube-system du cluster).
  # Passer à false si CrowdSec n'est pas installé.
  crowdsec: true

# ── Frontend (nginx) ──────────────────────────────────────────────────────────
frontend:
  image: ghcr.io/emmguardia/edusport-connect-front@sha256:4c37fb729eb247cd98d8f057eef8a3d6e13f15c5355ff331f6edc1c01b1104b4
  imagePullPolicy: IfNotPresent
  replicas: 1
  strategy:
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  port: 8080
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 5
    cpuTarget: 70
    memoryTarget: 80

# ── Backend (Node.js) ─────────────────────────────────────────────────────────
backend:
  # L'image sera pinnée par la CI après le premier build
  image: ghcr.io/emmguardia/edusport-connect-back@sha256:2c0cccf99ef88c613f4c571ecd1189dec067f2e05b691608d8c80e5379f9f7a6
  imagePullPolicy: IfNotPresent
  replicas: 1
  port: 3000
  frontendUrl: https://edusportconnect.fr
  adminNotificationEmail: contact@edusportconnect.fr
  resources:
    requests:
      cpu: "50m"
      memory: "128Mi"
    limits:
      cpu: "300m"
      memory: "256Mi"
  uploads:
    storageSize: "2Gi"
    storageClass: ""   # laisser vide pour utiliser la StorageClass par défaut du cluster
