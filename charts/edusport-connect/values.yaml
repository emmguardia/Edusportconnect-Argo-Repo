# values.yaml — ÉduSport Connect (prod)
# L'image frontend est mise à jour automatiquement par la CI (build-and-push.yml)
# Format : ghcr.io/<owner>/edusport-connect-front@sha256:<digest>  (piqué par la CI)
#
# ⚠️ Frontend uniquement pour l'instant. Le backend sera ajouté plus tard
#    (templates backend-* + sealed-secret + network-policy egress).

namespace: edusport-connect

# Nom de domaine principal (utilisé par l'IngressRoute Traefik)
domain: edusportconnect.fr

# ── Ingress (Traefik) ──────────────────────────────────────────────────────────
ingress:
  entryPoints:
    - web
  # Active le middleware crowdsec-bouncer (présent dans kube-system du cluster).
  # Passer à false si CrowdSec n'est pas installé.
  crowdsec: true

# ── Frontend (nginx) ──────────────────────────────────────────────────────────
frontend:
  image: ghcr.io/emmguardia/edusport-connect-front@sha256:4bfe73b705ba3acc6fc207648d4b7ea35b37e224824caa00fcec39a277dd82db
  imagePullPolicy: IfNotPresent
  replicas: 1
  strategy:
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  port: 8080
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 5
    cpuTarget: 70
    memoryTarget: 80
